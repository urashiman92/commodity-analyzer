name: CoT Weekly Update

on:
  schedule:
    # 毎週土曜 01:00 UTC（CoT公表 = 金曜15:30 ET の後、余裕を持って取得）
    # 祝日週の遅延時は取得できた最新 as_of を記録するだけ（鮮度判定は analyzer 側）
    - cron: "0 1 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update CoT state
        run: python scripts/update_cot_state.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit cot_state.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # このファイルの書き手は本ワークフローのみ（CLAUDE.md 書き手マップ参照）。
          git add cot_state.json
          if git diff --staged --quiet; then
            echo "変更なし、commit不要"
            exit 0
          fi
          git pull --rebase --autostash || git rebase --abort
          git commit -m "Update CoT state [skip ci]"
          for i in 1 2 3; do
            if git push; then
              echo "Push成功（試行$i回目）"
              exit 0
            fi
            echo "Push失敗、リトライ中（$i/3）..."
            sleep 2
            git pull --rebase --autostash || git rebase --abort
          done
          echo "Push最終的に失敗"
          exit 1
