name: Term Structure Raw Archive

# Phase4 後始末: データ品質監査の不合格（research/term_structure_audit.md 監査D）
# → derived系列のshadow記録は凍結し、生値保全に切替。
# アーカイブが6ヶ月分（front切替6回以上）到達後に基準Dを同一定義で再監査、
# 合格で Stage 2（term_structure shadow / protocol v1.6 充填）を再開する。

on:
  schedule:
    # 平日 22:30 UTC = 18:30 ET（CL決済 14:30 ET 確定後・Yahooへの反映を待つ余裕込み）
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch term raw
        run: python scripts/fetch_term_raw.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit term_raw.jsonl
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # このファイルの書き手は本ワークフローのみ（CLAUDE.md 書き手マップ参照）。
          git add term_raw.jsonl
          if git diff --staged --quiet; then
            echo "変更なし、commit不要"
            exit 0
          fi
          git pull --rebase --autostash || git rebase --abort
          git commit -m "Archive term raw [skip ci]"
          for i in 1 2 3; do
            if git push; then
              echo "Push成功（試行$i回目）"
              exit 0
            fi
            echo "Push失敗、リトライ中（$i/3）..."
            sleep 2
            git pull --rebase --autostash || git rebase --abort
          done
          echo "Push最終的に失敗"
          exit 1
