name: TA Analysis (15min)

on:
  # スケジュール起動は無効化 (fix/timeframe-cleanup)。
  # 短期足ノイズ＋Gemini無料枠(20req/日)枯渇の原因だったため自動実行を停止。
  # 手動実行する場合は config.yaml の timeframes に "15分" ブロックを一時的に戻すこと
  # (config に無い label は --tf で拾われず、分析対象にならない)。
  # schedule:
  #   - cron: "2,17,32,47 * * * *"
  workflow_dispatch:  # 手動実行のみ

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python main.py --tf 15分
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          WEBHOOK_WHEAT:        ${{ secrets.WEBHOOK_WHEAT }}
          WEBHOOK_GOLD:         ${{ secrets.WEBHOOK_GOLD }}
          WEBHOOK_OIL:          ${{ secrets.WEBHOOK_OIL }}
          WEBHOOK_CORN:         ${{ secrets.WEBHOOK_CORN }}
          WEBHOOK_SOY:          ${{ secrets.WEBHOOK_SOY }}
          WEBHOOK_COPPER:       ${{ secrets.WEBHOOK_COPPER }}
          WEBHOOK_CRITICAL:     ${{ secrets.WEBHOOK_CRITICAL }}
          WEBHOOK_DIVERGENCE:   ${{ secrets.WEBHOOK_DIVERGENCE }}
          WEBHOOK_REFERENCE:    ${{ secrets.WEBHOOK_REFERENCE }}
          PYTHONIOENCODING:     utf-8
